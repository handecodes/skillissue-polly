name: challenge
on: [push, workflow_dispatch]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet test test/Polly.Core.Tests/Polly.Core.Tests.csproj -f net8.0 -p:TreatWarningsAsErrors=false -p:CollectCoverage=false --filter "FullyQualifiedName~ScheduleTask_InlineContinuationDoesNotDeadlock"
